spring.datasource.url=${POSTGRES_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.port=8080
logging.level.org.springframework.web.client.RestClient=DEBUG
logging.level.org.springframework.ai=DEBUG
server.servlet.context-path=/api
jwt.secret=${JWT_SECRET}
jwt.expired=${JWT_EXPIRED}
salt_key=${SALT_KEY}

# OpenRouter API Configuration
openrouter.api.key=${OPENROUTER_API_KEY}
openrouter.api.url=${OPENROUTER_API_URL}
openrouter.api.model=${OPENROUTER_API_MODEL}

spring.ai.openai.api-key=${OPENROUTER_API_KEY}
spring.ai.openai.base-url=${OPENROUTER_API_URL}
spring.ai.openai.chat.options.model=${OPENROUTER_API_MODEL}
spring.ai.openai.chat.options.temperature=0.7

spring.jackson.deserialization.fail-on-unknown-properties=false
